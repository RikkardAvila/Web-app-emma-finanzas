<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emma Finanzas - Login</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Estilos adicionales específicos para el login que extienden styles.css */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-panel {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .auth-panel .brand {
      justify-content: center;
      margin-bottom: 30px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: left;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .form-group input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 12px 16px;
      color: white;
      font-family: inherit;
      transition: all 0.2s ease;
      font-size: 1rem;
    }

    .form-group input:focus {
      border-color: var(--accent-primary);
      background: rgba(255, 255, 255, 0.08);
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .auth-btn {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      font-size: 1rem;
    }

    .auth-switch {
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .auth-switch a {
      color: var(--accent-primary);
      font-weight: 500;
      cursor: pointer;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    #error-msg {
      color: var(--danger);
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.2);
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    
    #success-msg {
      color: var(--success);
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="panel auth-panel">
      <div class="brand">
        <div class="brand-logo">E</div>
        <div class="brand-text">
          <h1>Emma Finanzas</h1>
        </div>
      </div>
      
      <h2 id="auth-title" style="margin-bottom: 24px;">Iniciar Sesión</h2>
      
      <div id="error-msg"></div>
      <div id="success-msg"></div>

      <form class="auth-form" id="auth-form">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" required placeholder="tu@correo.com">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn primary auth-btn" id="submit-btn">Entrar</button>
      </form>

      <div class="auth-switch">
        <span id="switch-text">¿No tienes cuenta? <a id="switch-mode">Regístrate</a></span>
      </div>
    </div>
  </div>

  <!-- CDN de Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Nuestros scripts de auth -->
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  
  <!-- Lógica específica del formulario de Login/Registro -->
  <script>
    let isLogin = true;
    const form = document.getElementById('auth-form');
    const title = document.getElementById('auth-title');
    const submitBtn = document.getElementById('submit-btn');
    const switchModeBtn = document.getElementById('switch-mode');
    const switchText = document.getElementById('switch-text');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');

    switchModeBtn.addEventListener('click', () => {
      isLogin = !isLogin;
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      
      if (isLogin) {
        title.textContent = 'Iniciar Sesión';
        submitBtn.textContent = 'Entrar';
        switchText.innerHTML = '¿No tienes cuenta? <a id="switch-mode">Regístrate</a>';
      } else {
        title.textContent = 'Crear Cuenta';
        submitBtn.textContent = 'Registrarse';
        switchText.innerHTML = '¿Ya tienes cuenta? <a id="switch-mode">Inicia sesión</a>';
      }
      
      // Re-bind the event viewer since we replaced innerHTML
      document.getElementById('switch-mode').addEventListener('click', arguments.callee);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Procesando...';

      try {
        if (isLogin) {
          const { error } = await supabaseApp.auth.signInWithPassword({
            email,
            password,
          });
          if (error) throw error;
          // auth.js onAuthStateChange will handle the redirect
        } else {
          const { error, data } = await supabaseApp.auth.signUp({
            email,
            password,
          });
          if (error) throw error;
          
          if (data?.user && data?.session === null) {
            successMsg.textContent = 'Revisa tu correo para confirmar la cuenta.';
            successMsg.style.display = 'block';
          } else {
            successMsg.textContent = 'Cuenta creada. Iniciando sesión...';
            successMsg.style.display = 'block';
          }
        }
      } catch (err) {
        errorMsg.textContent = err.message || 'Ha ocurrido un error.';
        errorMsg.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = isLogin ? 'Entrar' : 'Registrarse';
      }
    });
  </script>
</body>

</html>
